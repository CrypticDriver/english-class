<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语口语课笔记 · 目录</title>
<style>
  :root{
    --bg:#0f1117; --card:#1a1d27; --card2:#222634; --ink:#e6e8ee;
    --muted:#9aa0b0; --accent:#7c9cff; --accent2:#ffb86b; --line:#2a2f3d; --green:#5ad19a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.7;padding:0 0 60px}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px}
  header{background:linear-gradient(135deg,#2b3350,#1a1d27);padding:48px 18px 36px;
    text-align:center;border-bottom:1px solid var(--line);margin-bottom:28px}
  header h1{font-size:28px;letter-spacing:.5px}
  header p{color:var(--muted);margin-top:10px;font-size:14px}
  .badge{display:inline-block;margin-top:16px;padding:5px 14px;border-radius:20px;
    background:rgba(124,156,255,.15);color:var(--accent);font-size:13px;border:1px solid rgba(124,156,255,.3)}
  .week{margin-bottom:26px}
  .week-title{font-size:15px;color:var(--muted);margin:0 4px 12px;padding-bottom:8px;
    border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;align-items:center}
  .week-title .date{font-size:12px;color:var(--accent)}
  a.lesson{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;margin-bottom:12px;text-decoration:none;color:var(--ink);transition:.15s}
  a.lesson:hover{border-color:var(--accent);background:var(--card2);transform:translateY(-1px)}
  .lesson .lt{font-size:17px;font-weight:600;margin-bottom:6px}
  .lesson .lt .lnum{color:var(--accent);font-size:13px;margin-right:8px}
  .lesson .topics{color:var(--muted);font-size:14px}
  .lesson .topics span{color:var(--accent2)}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:20px;
    border:1px dashed var(--line);border-radius:12px}
  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:36px}
</style>
</head>
<body>
<header>
  <h1>📚 英语口语课笔记</h1>
  <p>每周两节课 · 话题 / 范文 / 句式 / 词组精讲</p>
  <div class="badge">🐕 狗蛋整理</div>
</header>

<div class="wrap">

  <div style="background:rgba(255,184,107,.08);border:1px solid rgba(255,184,107,.3);border-radius:14px;padding:16px 18px;margin-bottom:24px">
    <div style="color:#ffb86b;font-weight:600;margin-bottom:6px">🧠 答题心法（通用）</div>
    <div style="color:#e6e8ee;font-size:15px;line-height:1.8"><b style="color:#ffb86b">先有观点，再想句子。</b> 听到题先亮一句明确立场（What do I think?），再用句式和词组去支撑它（How do I say it?）。顺序反了就变成背句子。</div>
  </div>

  <div class="week">
    <div class="week-title"><span>第 1 周</span><span class="date">2026-07-01 起</span></div>
    <a class="lesson" href="lessons/2026-07-01.html">
      <div class="lt"><span class="lnum">第 1 节</span>会说话的设备 & 连接vs孤独</div>
      <div class="topics">话题：<span>如果手机/手表/冰箱会说话</span> · <span>人比10年前更连接还是更孤独</span></div>
    </a>
  </div>

  <footer>
    🐕 狗蛋 (Goudan) · English Speaking Class Notes<br>
    每节课后自动更新 · <a href="https://github.com/CrypticDriver/english-class" style="color:var(--accent)">GitHub 源</a>
  </footer>

</div>
</body>
</html>
